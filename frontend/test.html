<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aptitude Test - DAES</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Layout shell ──────────────────────────────────────── */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body { display: flex; flex-direction: column; background: #06090f; }

    /* ── Sticky test topbar ────────────────────────────────── */
    .test-topbar {
      flex-shrink: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #0f766e 100%);
      box-shadow: 0 4px 28px rgba(0,0,0,0.40);
      position: relative;
      z-index: 50;
    }
    .timer-pill {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 0.9rem; padding: 0.55rem 1rem; flex-shrink: 0;
    }
    #submitBtn { width: auto !important; }

    /* ── Section tab bar ──────────────────────────────────── */
    .test-section-bar {
      display: flex; flex-shrink: 0;
      background: #07101f;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.2rem;
      padding: 0.75rem 0.5rem;
      border: none; border-bottom: 2px solid transparent;
      background: transparent;
      color: rgba(255,255,255,0.3);
      font-size: 0.6rem; font-weight: 900;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: all 0.18s;
    }
    .tab-btn + .tab-btn { border-left: 1px solid rgba(255,255,255,0.05); }
    .tab-btn:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.03); }
    .tab-btn.tab-active {
      color: #f97316; border-bottom-color: #f97316;
      background: rgba(249,115,22,0.05);
    }
    .tab-score {
      font-size: 0.82rem; font-weight: 900; letter-spacing: 0.02em;
      color: rgba(255,255,255,0.18);
    }
    .tab-btn.tab-active .tab-score { color: rgba(255,255,255,0.7); }
    .tab-section-name {
      display: block; font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: none;
      opacity: 0.55; margin-top: 0.1rem; line-height: 1.3;
      max-width: 14ch; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tab-btn.tab-active .tab-section-name { opacity: 0.75; }

    /* ── Main flex body (sidebar + question panel) ────────── */
    .test-body { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────── */
    .test-sidebar {
      width: 255px; flex-shrink: 0;
      background: #060d1a;
      border-left: 1px solid rgba(255,255,255,0.05);
      overflow-y: auto; padding: 0.9rem 0.9rem 2rem;
    }
    .test-sidebar::-webkit-scrollbar { width: 3px; }
    .test-sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 999px; }
    .sb-section-header {
      display: flex; align-items: center; gap: 0.45rem;
      font-size: 0.57rem; font-weight: 900;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      padding: 0.8rem 0.2rem 0.45rem;
    }
    .sb-section-header:not(:first-child) { margin-top: 0.75rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1rem; }
    .sb-dot { width: 0.38rem; height: 0.38rem; border-radius: 999px; background: #f97316; flex-shrink: 0; }
    .sb-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.36rem; }
    .sb-q {
      aspect-ratio: 1; border-radius: 0.45rem;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.32);
      font-size: 0.74rem; font-weight: 800;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.12s;
    }
    .sb-q:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.15); }
    .sb-q.sq-answered {
      background: rgba(37,99,235,0.16); border-color: rgba(37,99,235,0.38);
      color: #93c5fd;
    }
    .sb-q.sq-current {
      background: #f97316; border-color: #f97316; color: #fff;
      box-shadow: 0 0 0 2px rgba(249,115,22,0.28);
    }

    /* ── Question panel — vertically centred ─────────────── */
    .test-q-panel {
      flex: 1; overflow-y: auto; background: #1a2540;
      display: flex; flex-direction: column; align-items: center;
    }
    .test-q-panel::-webkit-scrollbar { width: 5px; }
    .test-q-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }

    /* margin:auto on flex child → centres when content is shorter than the panel */
    .q-panel-inner {
      width: 100%; max-width: 680px;
      margin: auto;
      padding: 2.25rem 2rem;
    }

    /* Section badge */
    .q-section-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      border: 1px solid rgba(249,115,22,0.28);
      border-radius: 999px; padding: 0.26rem 0.9rem;
      font-size: 0.59rem; font-weight: 900;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: #fb923c;
      background: rgba(249,115,22,0.08);
      margin-bottom: 0.6rem;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .q-section-badge:hover {
      background: rgba(249,115,22,0.18); border-color: rgba(249,115,22,0.55);
    }
    .q-badge-dot { width: 0.35rem; height: 0.35rem; border-radius: 999px; background: #f97316; flex-shrink: 0; }

    /* Question meta line */
    .q-meta {
      font-size: 0.71rem; font-weight: 700;
      color: rgba(255,255,255,0.45);
      margin-bottom: 1.3rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .q-meta .sep { color: rgba(255,255,255,0.2); }

    /* Question text card */
    .q-text-card {
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.1);
      border-left: 3px solid #f97316;
      border-radius: 0.9rem; padding: 1.4rem 1.6rem;
      color: #f1f5f9; font-size: 1rem; font-weight: 600;
      line-height: 1.8; margin-bottom: 1.35rem;
    }

    /* Option tiles */
    .q-options { display: flex; flex-direction: column; gap: 0.5rem; }
    .q-opt {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.95rem 1.15rem;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.825rem;
      cursor: pointer; background: rgba(0,0,0,0.22);
      transition: all 0.15s;
      color: rgba(255,255,255,0.78); font-weight: 600; font-size: 0.9rem;
      -webkit-user-select: none; user-select: none;
    }
    .q-opt:hover {
      border-color: rgba(249,115,22,0.3);
      background: rgba(249,115,22,0.04);
      color: rgba(255,255,255,0.9);
    }
    .q-opt.q-selected {
      border-color: #2563eb;
      background: rgba(37,99,235,0.12);
      color: #fff;
    }
    .q-opt-badge {
      width: 1.85rem; height: 1.85rem; flex-shrink: 0;
      border-radius: 0.4rem;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 900; color: rgba(255,255,255,0.55);
      transition: all 0.15s;
    }
    .q-opt:hover .q-opt-badge { border-color: rgba(249,115,22,0.4); color: #fb923c; }
    .q-opt.q-selected .q-opt-badge { background: #2563eb; border-color: #2563eb; color: #fff; }

    /* Fill-in-the-blank */
    .q-fill-wrap { margin-top: 0.25rem; }
    .q-fill-input {
      width: 100%; padding: 0.9rem 1.1rem;
      border-radius: 0.75rem;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff; font-size: 1rem; font-weight: 600;
      outline: none; transition: border-color 0.15s, background 0.15s;
    }
    .q-fill-input::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; }
    .q-fill-input:focus {
      border-color: #3b82f6;
      background: rgba(59,130,246,0.08);
    }

    /* Prev / Next navigation */
    .q-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 1.75rem; padding-top: 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .q-nav-btn {
      display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0.6rem 1.25rem; border-radius: 0.6rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5); font-weight: 800; font-size: 0.79rem;
      cursor: pointer; transition: all 0.14s;
    }
    .q-nav-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.09); color: #fff;
      border-color: rgba(255,255,255,0.18);
    }
    .q-nav-btn:disabled { opacity: 0.18; cursor: not-allowed; }
    .q-nav-btn.q-next {
      background: rgba(249,115,22,0.1); border-color: rgba(249,115,22,0.28); color: #fb923c;
    }
    .q-nav-btn.q-next:hover:not(:disabled) {
      background: rgba(249,115,22,0.2); color: #fff; border-color: rgba(249,115,22,0.5);
    }

    /* Markdown table rendered inside a question card */
    .q-table {
      width: 100%; border-collapse: collapse;
      margin: 0.75rem 0; font-size: 0.88rem;
      border-radius: 0.5rem; overflow: hidden;
    }
    .q-table th, .q-table td {
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.55rem 0.85rem; text-align: left;
      vertical-align: top; line-height: 1.5;
    }
    .q-table th {
      background: rgba(249,115,22,0.15);
      color: #fb923c; font-weight: 900;
      font-size: 0.75rem; letter-spacing: 0.05em; text-transform: uppercase;
    }
    .q-table td { color: #e2e8f0; }
    .q-table tbody tr:nth-child(even) td { background: rgba(255,255,255,0.03); }
    .q-table tbody tr:hover td { background: rgba(255,255,255,0.06); }

    /* Paragraph lines mixed with a table block */
    .q-text-para { margin: 0 0 0.5rem; }
    .q-text-para:last-child { margin-bottom: 0; }

    /* Question image */
    .q-img-wrap { margin: 0.75rem 0 1rem; display: flex; justify-content: center; }
    .q-img { max-width: 100%; max-height: 260px; border-radius: 0.65rem;
             border: 1px solid rgba(255,255,255,0.1); object-fit: contain; }

    /* Disable all text selection inside the form */
    #testForm { -webkit-user-select: none; user-select: none; }

    /* Fullscreen exit shield */
    #screenshotShield {
      display: flex; position: fixed; inset: 0; background: #0f172a;
      z-index: 999999; flex-direction: column; align-items: center;
      justify-content: center; gap: 1rem;
    }
    #screenshotShield.hidden { display: none; }
  </style>
</head>

<body>

  <!-- Fullscreen entry prompt — shown before test starts -->
  <div id="fullscreenPrompt"
       style="display:flex;position:fixed;inset:0;z-index:1000000;flex-direction:column;
              align-items:center;justify-content:center;gap:1.5rem;padding:1.5rem;
              background:linear-gradient(150deg,#0f172a 0%,#1e3a8a 55%,#0f766e 100%)">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf"
         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
    </svg>
    <p style="color:#f1f5f9;font-size:1.15rem;font-weight:800;text-align:center;max-width:22rem;line-height:1.5;">
      Fullscreen mode is required to take the test.
    </p>
    <p style="color:#94a3b8;font-size:0.8rem;font-weight:600;text-align:center;max-width:20rem;line-height:1.6;">
      Your screen will be blocked if you exit fullscreen at any point during the test.
    </p>
    <button id="enterFsBtn" class="btn" style="padding:0.85rem 2rem;font-size:0.95rem;display:flex;align-items:center;gap:0.5rem;">
      Enter Fullscreen &amp; Start Test
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    </button>
  </div>

  <!-- Fullscreen exit shield — shown if the participant leaves fullscreen during the test -->
  <div id="screenshotShield" class="hidden" aria-hidden="true">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#f87171"
         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
    </svg>
    <p style="color:#f1f5f9;font-size:1rem;font-weight:700;text-align:center;max-width:22rem;line-height:1.5;">
      Please re-enter fullscreen to continue the test.
    </p>
    <button id="reenterFsBtn"
            style="margin-top:0.5rem;padding:0.7rem 1.5rem;background:#2dd4bf;
                   color:#0f172a;font-weight:800;border-radius:0.75rem;border:none;cursor:pointer;font-size:0.9rem;">
      Re-enter Fullscreen
    </button>
  </div>

  <!-- ── Sticky test topbar (kept identical to previous design) ── -->
  <header class="test-topbar">
    <div class="max-w-none px-5 sm:px-7 py-4">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">

        <!-- Left: logo + title + answered count -->
        <div class="flex items-center gap-3">
          <img src="assets/logo-icon.png" alt="DAES logo" class="logo-icon flex-shrink-0">
          <div>
            <h1 class="text-xl sm:text-2xl font-black text-white leading-tight">Aptitude Test</h1>
            <p class="text-white/50 text-xs font-semibold mt-0.5">
              <span id="answeredCount" class="text-teal-300 font-black">0/0</span> answered
            </p>
          </div>
        </div>

        <!-- Right: timer + submit -->
        <div class="flex items-center gap-3">
          <div class="timer-pill">
            <svg class="w-3.5 h-3.5 text-red-300 flex-shrink-0" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span class="text-white/55 text-[0.65rem] font-black uppercase tracking-wider hidden sm:inline">
              Time Left
            </span>
            <span id="timer" class="text-white font-black text-base tracking-wide tabular-nums">–:––</span>
          </div>
          <button id="submitBtn" disabled
                  class="btn flex items-center gap-2 py-2.5 px-5 text-sm whitespace-nowrap
                         opacity-40 cursor-not-allowed">
            Submit Test
            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Full-width progress bar -->
    <div class="progress-track" style="border-radius:0;height:4px;">
      <div id="progressBar" class="progress-bar"></div>
    </div>
  </header>

  <!-- ── Section tab bar ──────────────────────────────────────── -->
  <div id="testSectionBar" class="test-section-bar">
    <!-- Filled by buildSidebarAndTabs() in test.js -->
  </div>

  <!-- ── Main layout: question panel + sidebar ────────────────── -->
  <div class="test-body">

    <!-- Left: single-question display -->
    <div class="test-q-panel">
      <div class="q-panel-inner">
        <div id="testForm"></div>
        <p id="message" class="mt-4"></p>
      </div>
    </div>

    <!-- Right sidebar: question number nav -->
    <aside id="testSidebar" class="test-sidebar">
      <!-- Filled by buildSidebarAndTabs() in test.js -->
    </aside>

  </div>

  <script src="js/common.js"></script>
  <script src="js/test.js"></script>

  <script>
    (function () {
      const shield     = document.getElementById('screenshotShield');
      const reenterBtn = document.getElementById('reenterFsBtn');
      const fsPrompt   = document.getElementById('fullscreenPrompt');
      const enterFsBtn = document.getElementById('enterFsBtn');
      let testStarted  = false;

      function showShield() { shield.classList.remove('hidden'); }
      function hideShield() { shield.classList.add('hidden'); }

      enterFsBtn.addEventListener('click', async () => {
        try {
          await document.documentElement.requestFullscreen({ navigationUI: 'hide' });
        } catch (_) {}
        fsPrompt.remove();
        testStarted = true;
        hideShield();
        initTest();
      });

      reenterBtn.addEventListener('click', async () => {
        try { await document.documentElement.requestFullscreen({ navigationUI: 'hide' }); } catch (_) {}
      });

      document.addEventListener('fullscreenchange', () => {
        if (!testStarted) return;
        document.fullscreenElement ? hideShield() : showShield();
      });
    })();
  </script>
</body>
</html>
